[project]
name = "tsdhn"
version = "0.1.1"
description = "TSDHN CLI for researchers and simulation engine"
requires-python = ">=3.14"
readme = "readme.md"
license = { text = "MIT" }
authors = [
    { name = "David Duran", email = "dadch1404@gmail.com" },
]
dependencies = [
    "pydantic==2.13.4",
    "scipy==1.18.0",
    "numpy==2.5.1",
    "pygmt==0.18.0",
    "pyyaml==6.0.3",
    "typer==0.26.8",
    "rich==15.0.0",
]

[project.scripts]
tsdhn = "tsdhn.cli.main:main"

[build-system]
requires = ["uv_build==0.11.28"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "tsdhn"
module-root = ""
