[project]
name = "tsdhn-cli"
version = "0.1.1"
description = "CLI: run simulations directly via the shared core"
requires-python = ">=3.14"
readme = "readme.md"
license = { text = "MIT" }
authors = [
    { name = "David Duran", email = "dadch1404@gmail.com" },
]
dependencies = [
    "tsdhn-core",
    "typer==0.20.0",
    "rich==15.0.0",
]

[project.scripts]
tsdhn = "cli.main:main"

[build-system]
requires = ["uv_build==0.11.27"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "cli"
module-root = ""
