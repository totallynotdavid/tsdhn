[project]
name = "tsdhn-api"
version = "0.1.0"
description = "TSDHN tsunami simulation orchestrator (FastAPI service + RQ worker)"
requires-python = ">=3.14"
readme = "readme.md"
license = { text = "MIT" }
authors = [
    { name = "David Duran", email = "dadch1404@gmail.com" },
]
dependencies = [
    "tsdhn-core",
    "fastapi==0.138.1",
    "uvicorn==0.49.0",
    "pydantic==2.13.4",
    "redis==5.3.1",
    "rq==2.10.0",
    "anyio==4.14.1",
]

[project.scripts]
tsdhn-api = "api.main:start_app"
tsdhn-worker = "api.worker:main"

[build-system]
requires = ["uv_build==0.11.25"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "api"
module-root = ""
