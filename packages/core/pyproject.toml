[project]
name = "tsdhn-core"
version = "0.1.0"
description = "TSDHN domain core: tsunami calculations and simulation pipeline orchestrator"
requires-python = ">=3.14"
readme = "readme.md"
license = { text = "MIT" }
authors = [
    { name = "David Duran", email = "dadch1404@gmail.com" },
]
dependencies = [
    "pydantic==2.13.4",
    "scipy==1.18.0",
    "numpy==2.5.0",
    "pygmt==0.18.0",
    "pyyaml==6.0.3",
]

[build-system]
requires = ["uv_build==0.11.27"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "core"
module-root = ""
