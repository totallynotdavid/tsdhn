name: CI

on:
    push:
        branches: ["master"]
    pull_request:
    merge_group:
    workflow_dispatch:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    UV_VERSION: "0.11.27"
    PYTHON_VERSION: "3.14"

# Least-privilege by default. Each job opts into what it needs.
permissions: {}

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v7

            - uses: astral-sh/setup-uv@v8.3.2
              with:
                  version: ${{ env.UV_VERSION }}
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            - run: uv sync --all-packages --group dev --no-install-project
            - run: uv run ruff check --select E,F,W,I,B,UP,S,SIM,RUF .
            - run: uv run ruff format --check .
            - run: uv run mypy --strict packages

    test:
        name: Test (py${{ matrix.python-version }})
        runs-on: ubuntu-latest
        env:
            TSDHN_MODEL_DIR: ${{ github.workspace }}/model
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.14"]
        steps:
            - uses: actions/checkout@v7

            - uses: astral-sh/setup-uv@v8.3.2
              with:
                  version: ${{ env.UV_VERSION }}
                  python-version: ${{ matrix.python-version }}
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            # libgmt is needed by pygmt (a runtime dep of `tsdhn`).
            # Install the system lib and create the libgmt.so symlink that
            # pygmt expects. The symlink step is idempotent.
            - name: Install GMT (libgmt) for pygmt
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends gmt libgmt-dev
                  SO=$(ls /usr/lib/**/libgmt.so.* 2>/dev/null | head -n1)
                  if [ -z "$SO" ]; then
                      echo "::error::libgmt.so.* not found after apt install"
                      ls -R /usr/lib | grep -i gmt || true
                      exit 1
                  fi
                  sudo ln -sf "$SO" "$(dirname "$SO")/libgmt.so"

            - run: uv sync --all-packages --group dev

            - name: Run tests with coverage
              run: uv run pytest -n auto --maxfail=1 -q --cov=packages --cov-report= --cov-fail-under=0

            - name: Name coverage data
              if: always()
              run: |
                  if [ -f .coverage ]; then
                      mv .coverage ".coverage.${{ matrix.python-version }}"
                  fi

            - name: Upload coverage data
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: coverage-data-${{ matrix.python-version }}
                  path: .coverage.*
                  include-hidden-files: true
                  if-no-files-found: ignore

    coverage:
        name: Coverage gate
        runs-on: ubuntu-latest
        needs: test
        if: always()
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v7

            - uses: astral-sh/setup-uv@v8.3.2
              with:
                  version: ${{ env.UV_VERSION }}
                  python-version: ${{ env.PYTHON_VERSION }}
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            - name: Sync coverage tool
              run: uv sync --group dev --no-install-project

            - name: Download coverage data
              uses: actions/download-artifact@v8
              with:
                  pattern: coverage-data-*
                  merge-multiple: true

            - name: Combine coverage and enforce baseline
              run: |
                  uv run coverage combine
                  uv run coverage html --skip-covered --skip-empty
                  uv run coverage report --format=markdown --fail-under=0 >> "$GITHUB_STEP_SUMMARY"
                  uv run coverage report

            - name: Upload HTML coverage report
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: html-coverage-report
                  path: htmlcov

    web:
        name: Web (lint, format, types)
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v7

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.14"

            - run: bun install --frozen-lockfile
            - run: bun run lint
            - run: bun run fmt:check
            - run: bun --filter web check

    contract:
        name: API client contract (no drift)
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v7

            - uses: astral-sh/setup-uv@v8.3.2
              with:
                  version: ${{ env.UV_VERSION }}
                  python-version: ${{ env.PYTHON_VERSION }}
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            # api.main imports pygmt through tsdhn, which needs libgmt at import time.
            - name: Install GMT (libgmt) for pygmt
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends gmt libgmt-dev
                  SO=$(ls /usr/lib/**/libgmt.so.* 2>/dev/null | head -n1)
                  [ -n "$SO" ] && sudo ln -sf "$SO" "$(dirname "$SO")/libgmt.so"

            - run: uv sync --all-packages --group dev

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.14"

            - run: bun install --frozen-lockfile
            - run: bun run gen:client

            - name: Fail on drift
              run: |
                  if ! git diff --quiet libs/api-client; then
                      echo "::error::@tsdhn/api-client is stale. Run 'bun run gen:client' and commit."
                      git diff libs/api-client
                      exit 1
                  fi
