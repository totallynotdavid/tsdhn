name: Security

on:
    push:
        branches: ["main"]
    pull_request:
    schedule:
        - cron: "0 6 * * 1"
    workflow_dispatch:

concurrency:
    group: security-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    UV_VERSION: "0.11.27"

permissions: {}

jobs:
    codeql:
        name: CodeQL
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read
            security-events: write
        strategy:
            fail-fast: false
            matrix:
                language: ["python"]
        steps:
            - uses: actions/checkout@v7

            - uses: github/codeql-action/init@v4
              with:
                  languages: ${{ matrix.language }}
                  queries: security-extended,security-and-quality

            - uses: github/codeql-action/analyze@v4
              with:
                  category: "/language:${{ matrix.language }}"

    pip-audit:
        name: pip-audit
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v7

            - uses: astral-sh/setup-uv@v8.3.0
              with:
                  version: ${{ env.UV_VERSION }}
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            - name: Export locked requirements
              # --no-emit-workspace drops the api/cli workspace
              # members so pip-audit doesn't see them as editable installs
              # (which fail --strict even with --skip-editable).
              # --locked fails the job if uv.lock is stale.
              # https://docs.astral.sh/uv/reference/cli/#uv-export
              run: |
                  set -euxo pipefail
                  uv export \
                      --locked \
                      --no-hashes \
                      --all-packages \
                      --no-emit-workspace \
                      --output-file=requirements.lock.txt

            - name: pip-audit
              # uvx runs pip-audit in an isolated env so it doesn't sync
              # the workspace (which would re-introduce editable installs).
              # https://pypi.org/project/pip-audit/
              run: uvx pip-audit --strict --requirement requirements.lock.txt

    gitleaks:
        name: Gitleaks (secrets)
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - uses: gitleaks/gitleaks-action@v3
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
