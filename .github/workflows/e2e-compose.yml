name: Compose E2E

on:
  workflow_dispatch:

concurrency:
  group: compose-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  APP_JOB_ID: 4cfe522f-7e7d-46e0-96ca-7b98743fb9f5
  BACKEND_SERVICE_TOKEN: compose-e2e-token
  BETTER_AUTH_SECRET: compose-e2e-better-auth-secret
  ORIGIN: http://localhost:3000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_BUCKET: tsdhn-results

jobs:
  backend:
    name: Backend stack
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v7

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Build and start backend stack
        run: |
          set -euo pipefail
          docker compose up -d --build postgres minio compute-migrate api worker

      - name: Create MinIO results bucket
        run: |
          set -euo pipefail
          docker compose exec -T minio mc alias set local http://127.0.0.1:9000 "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
          docker compose exec -T minio mc mb --ignore-existing "local/$MINIO_BUCKET"

      - name: Wait for API
        run: |
          set -euo pipefail
          for attempt in {1..60}; do
            if curl -fsS http://localhost:8000/api/v1/version; then
              exit 0
            fi
            docker compose ps
            sleep 5
          done
          echo "::error::API did not become reachable"
          exit 1

      - name: Submit idempotent simulation job
        run: |
          set -euo pipefail
          payload="$(
            jq -cn --arg app_job_id "$APP_JOB_ID" '{
              app_job_id: $app_job_id,
              input: {
                Mw: 8.0,
                h: 10.0,
                lat0: -20.5,
                lon0: -70.5,
                hhmm: "0000",
                dia: "23"
              },
              skip_steps: []
            }'
          )"

          first="$(
            curl -fsS -X POST http://localhost:8000/api/v1/jobs \
              -H "Authorization: Bearer $BACKEND_SERVICE_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$payload"
          )"
          echo "$first" | jq .
          echo "$first" > first-job.json

          second="$(
            curl -fsS -X POST http://localhost:8000/api/v1/jobs \
              -H "Authorization: Bearer $BACKEND_SERVICE_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$payload"
          )"
          echo "$second" | jq .
          echo "$second" > second-job.json

          first_compute_job_id="$(jq -r .compute_job_id first-job.json)"
          second_compute_job_id="$(jq -r .compute_job_id second-job.json)"
          test "$first_compute_job_id" = "$second_compute_job_id"

          conflicting="$(
            jq -cn --arg app_job_id "$APP_JOB_ID" '{
              app_job_id: $app_job_id,
              input: {
                Mw: 8.1,
                h: 10.0,
                lat0: -20.5,
                lon0: -70.5,
                hhmm: "0000",
                dia: "23"
              },
              skip_steps: []
            }'
          )"
          status="$(
            curl -sS -o conflict-response.json -w "%{http_code}" \
              -X POST http://localhost:8000/api/v1/jobs \
              -H "Authorization: Bearer $BACKEND_SERVICE_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$conflicting"
          )"
          cat conflict-response.json | jq .
          test "$status" = "400"

      - name: Assert job rows and queue rows
        run: |
          set -euo pipefail
          compute_count="$(
            docker compose exec -T postgres psql -U tsdhn -d tsdhn_compute -tAc \
              "SELECT count(*) FROM compute_jobs WHERE external_id = '$APP_JOB_ID'::uuid"
          )"
          test "$compute_count" = "1"

          docker compose exec -T postgres psql -U tsdhn -d tsdhn_compute -c \
            "SELECT tablename FROM pg_tables WHERE schemaname = 'public' AND tablename LIKE 'procrastinate_%' ORDER BY tablename"

          queue_count="$(
            docker compose exec -T postgres psql -U tsdhn -d tsdhn_compute -tAc \
              "SELECT count(*) FROM procrastinate_jobs WHERE task_name = 'api.run_simulation' AND queue_name = 'simulations'"
          )"
          test "$queue_count" = "1"

      - name: Poll job to completion
        run: |
          set -euo pipefail
          rm -f status-history.jsonl
          deadline=$((SECONDS + 1800))

          while [ "$SECONDS" -lt "$deadline" ]; do
            body="$(
              curl -fsS http://localhost:8000/api/v1/jobs/"$APP_JOB_ID" \
                -H "Authorization: Bearer $BACKEND_SERVICE_TOKEN"
            )"
            echo "$body" | jq -c . | tee -a status-history.jsonl

            status="$(echo "$body" | jq -r .status)"
            case "$status" in
              completed)
                echo "$body" > final-status.json
                exit 0
                ;;
              failed)
                echo "$body" > final-status.json
                echo "::error::Simulation failed"
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "::error::Simulation did not complete before timeout"
          exit 1

      - name: Assert completed state and artifact metadata
        run: |
          set -euo pipefail
          jq . final-status.json
          jq -e --arg key "simulations/$APP_JOB_ID/reporte.pdf" '
            .status == "completed"
            and .report_available == true
            and .result_bucket == env.MINIO_BUCKET
            and .result_key == $key
            and (.step_index | type == "number")
            and (.total_steps | type == "number")
            and (.calculation | type == "object")
            and (.travel_times | type == "object")
          ' final-status.json

          docker compose exec -T minio mc stat "local/$MINIO_BUCKET/simulations/$APP_JOB_ID/reporte.pdf"

          persisted="$(
            docker compose exec -T postgres psql -U tsdhn -d tsdhn_compute -tAc \
              "SELECT status || '|' || result_key FROM compute_jobs WHERE external_id = '$APP_JOB_ID'::uuid"
          )"
          test "$persisted" = "completed|simulations/$APP_JOB_ID/reporte.pdf"

      - name: Download report through API
        run: |
          set -euo pipefail
          curl -fsSL -D report-headers.txt \
            http://localhost:8000/api/v1/jobs/"$APP_JOB_ID"/report \
            -H "Authorization: Bearer $BACKEND_SERVICE_TOKEN" \
            -o reporte.pdf
          test -s reporte.pdf
          file reporte.pdf

      - name: Capture compose diagnostics
        if: always()
        run: |
          mkdir -p e2e-artifacts
          docker compose ps -a > e2e-artifacts/compose-ps.txt || true
          docker compose logs --no-color > e2e-artifacts/compose.log || true
          cp -f ./*.json ./*.jsonl ./*.txt reporte.pdf e2e-artifacts/ 2>/dev/null || true

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: compose-e2e-diagnostics
          path: e2e-artifacts
          if-no-files-found: ignore

      - name: Stop stack
        if: always()
        run: docker compose down -v --remove-orphans
