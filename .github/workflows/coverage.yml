name: "Test Coverage"
on:
    push:
        branches: ["main"]
        paths:
            - "orchestrator/**"
            - "cli/**"
            - "packages/**"
            - "pyproject.toml"
            - "uv.lock"
            - ".github/workflows/coverage.yml"
    pull_request:
        branches: ["main"]
        paths:
            - "orchestrator/**"
            - "cli/**"
            - "packages/**"
            - "pyproject.toml"
            - "uv.lock"
            - ".github/workflows/coverage.yml"
    workflow_dispatch:

permissions:
    contents: read
    statuses: write

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.14"

            - name: Install uv
              uses: astral-sh/setup-uv@v6
              with:
                  version: "0.11.25"
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            - name: gmt (#33) fix for libgmt symlink
              run: |
                  sudo apt-get install -y gmt libgmt-dev
                  sudo find /usr -name "libgmt.so.*" -exec sudo ln -sf {} $(dirname {})/libgmt.so \;

            - name: Sync workspace
              run: uv sync --all-packages --group dev

            - name: Run tests with coverage
              run: |
                  uv run coverage run -m pytest
                  uv run coverage report
                  uv run coverage json
                  export TOTAL=$(python -c "import json;print(json.load(open('coverage.json'))['totals']['percent_covered_display'])")
                  echo "total=$TOTAL" >> $GITHUB_ENV
                  echo "### Total coverage: ${TOTAL}%" >> $GITHUB_STEP_SUMMARY

            - name: Make badge
              uses: schneegans/dynamic-badges-action@7142847813c746736c986b42dec98541e49a2cea # v1.7.0
              with:
                  auth: ${{ secrets.GIST_TOKEN }}
                  gistID: fb9b3bc6236ef7e8a1560403b5c58186
                  filename: covbadge.json
                  label: Coverage
                  message: ${{ env.total }}%
                  minColorRange: 40
                  maxColorRange: 90
                  valColorRange: ${{ env.total }}
