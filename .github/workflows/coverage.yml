name: "Test Coverage"
on:
    push:
        branches: ["main"]
        paths:
            - "orchestrator/**"
    pull_request:
        branches: ["main"]
        paths:
            - "orchestrator/**"
    workflow_dispatch:

permissions:
    contents: read
    statuses: write

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12.3"

            - name: gmt (#33) fix for libgmt symlink
              run: |
                  sudo apt-get install -y gmt libgmt-dev
                  sudo find /usr -name "libgmt.so.*" -exec sudo ln -sf {} $(dirname {})/libgmt.so \;

            - uses: snok/install-poetry@ff8a7d7de27005376176819789742a2280cc35e2 # v1.4.1

            - run: poetry install --with dev

            - name: Run tests with coverage
              run: |
                  poetry run coverage run -m pytest
                  poetry run coverage report
                  poetry run coverage json
                  export TOTAL=$(python -c "import json;print(json.load(open('coverage.json'))['totals']['percent_covered_display'])")
                  echo "total=$TOTAL" >> $GITHUB_ENV
                  echo "### Total coverage: ${TOTAL}%" >> $GITHUB_STEP_SUMMARY

            - name: Make badge
              uses: schneegans/dynamic-badges-action@7142847813c746736c986b42dec98541e49a2cea # v1.7.0
              with:
                  auth: ${{ secrets.GIST_TOKEN }}
                  gistID: fb9b3bc6236ef7e8a1560403b5c58186
                  filename: covbadge.json
                  label: Coverage
                  message: ${{ env.total }}%
                  minColorRange: 40
                  maxColorRange: 90
                  valColorRange: ${{ env.total }}
