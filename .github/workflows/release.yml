name: Release

on:
    push:
        tags: ["v*.*.*"]
    workflow_dispatch:

# Default: no permissions.
# Each job opts into what it needs.
permissions: {}

concurrency:
    group: release-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

env:
    UV_VERSION: "0.11.27"
    PYTHON_VERSION: "3.14"
    IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
    CANDIDATE_TAG: candidate-${{ github.run_id }}-${{ github.run_attempt }}
    RELEASE_BRANCH_TAG: master

jobs:
    build-sdist-wheels:
        name: Build sdist + wheels
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - uses: astral-sh/setup-uv@v8.3.0
              with:
                  version: ${{ env.UV_VERSION }}
                  python-version: ${{ env.PYTHON_VERSION }}
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            - name: Sync with build group
              run: uv sync --all-packages --group dev --group build

            - name: Build tsdhn
              run: uv build --package tsdhn --out-dir dist/tsdhn

            - name: Build tsdhn-api
              run: uv build --package tsdhn-api --out-dir dist/api

            - name: Upload dist artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: dist
                  path: |
                      dist/tsdhn/*
                      dist/api/*

    build-model-assets:
        name: Build model asset bundle
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v7

            - name: Build model archive
              run: |
                  set -euo pipefail
                  mkdir -p dist/model
                  version="${GITHUB_REF_NAME#v}"
                  archive="dist/model/tsdhn-model-v${version}.tar.gz"
                  tar -czf "$archive" -C model .
                  sha256sum "$archive" > "${archive}.sha256"
                  python - <<'PY'
                  import json
                  import os
                  from pathlib import Path

                  version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
                  files = sorted(str(path.relative_to("model")) for path in Path("model").rglob("*") if path.is_file())
                  manifest = {
                      "version": version,
                      "model_schema": 1,
                      "source_commit": os.environ["GITHUB_SHA"],
                      "files": files,
                  }
                  Path(f"dist/model/tsdhn-model-manifest-v{version}.json").write_text(
                      json.dumps(manifest, indent=2, sort_keys=True) + "\n",
                      encoding="utf-8",
                  )
                  PY

            - name: Upload model assets
              uses: actions/upload-artifact@v7
              with:
                  name: model-assets
                  path: dist/model/*

    build-toolchain-image:
        name: Build candidate Docker (toolchain)
        needs: build-sdist-wheels
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v7

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
              with:
                  images: ${{ env.IMAGE_REGISTRY }}/tsdhn-toolchain
                  tags: |
                      type=raw,value=${{ env.CANDIDATE_TAG }}

            - name: Build and push candidate
              id: build
              uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
              with:
                  context: .
                  file: deploy/toolchain.Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha,scope=toolchain
                  cache-to: type=gha,mode=max,scope=toolchain
                  platforms: linux/amd64
                  provenance: true
                  sbom: true

            - name: Attest candidate image
              uses: actions/attest@v4.1.1
              with:
                  subject-name: ${{ env.IMAGE_REGISTRY }}/tsdhn-toolchain
                  subject-digest: ${{ steps.build.outputs.digest }}
                  push-to-registry: true
                  show-summary: false

    build-app-images:
        name: Build candidate Docker (${{ matrix.target }})
        needs: [build-sdist-wheels, build-toolchain-image]
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            id-token: write
            attestations: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: api
                      image: tsdhn-api
                      dockerfile: deploy/api.Dockerfile
                      cache_scope: api
                    - target: web
                      image: tsdhn-web
                      dockerfile: deploy/web.Dockerfile
                      cache_scope: web
                    - target: development
                      image: tsdhn-dev
                      dockerfile: .devcontainer/Dockerfile
                      cache_scope: dev
        steps:
            - uses: actions/checkout@v7

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
              with:
                  images: ${{ env.IMAGE_REGISTRY }}/${{ matrix.image }}
                  tags: |
                      type=raw,value=${{ env.CANDIDATE_TAG }}

            - name: Build and push candidate
              id: build
              uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
              with:
                  context: .
                  file: ${{ matrix.dockerfile }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      TOOLCHAIN_IMAGE=${{ env.IMAGE_REGISTRY }}/tsdhn-toolchain:${{ env.CANDIDATE_TAG }}
                  cache-from: type=gha,scope=${{ matrix.cache_scope }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
                  platforms: linux/amd64
                  provenance: true
                  sbom: true

            - name: Attest candidate image
              uses: actions/attest@v4.1.1
              with:
                  subject-name: ${{ env.IMAGE_REGISTRY }}/${{ matrix.image }}
                  subject-digest: ${{ steps.build.outputs.digest }}
                  push-to-registry: true
                  show-summary: false

    compose-smoke:
        name: Compose smoke candidate images
        needs: build-app-images
        runs-on: ubuntu-latest
        timeout-minutes: 60
        permissions:
            contents: read
            packages: read
        env:
            API_IMAGE: ${{ env.IMAGE_REGISTRY }}/tsdhn-api:${{ env.CANDIDATE_TAG }}
            TOOLCHAIN_IMAGE: ${{ env.IMAGE_REGISTRY }}/tsdhn-toolchain:${{ env.CANDIDATE_TAG }}
            APP_JOB_ID: 4cfe522f-7e7d-46e0-96ca-7b98743fb9f5
            BACKEND_SERVICE_TOKEN: compose-e2e-token
            BETTER_AUTH_SECRET: compose-e2e-better-auth-secret
            ORIGIN: http://localhost:3000
            MINIO_ACCESS_KEY: minioadmin
            MINIO_SECRET_KEY: minioadmin
            MINIO_BUCKET: tsdhn-results
        steps:
            - uses: actions/checkout@v7

            - name: Show Docker versions
              run: |
                  docker version
                  docker compose version

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Pull candidate runtime image
              run: docker pull "$API_IMAGE"

            - name: Validate compose config
              run: docker compose config --quiet

            - name: Start backend stack from candidate images
              run: docker compose up -d --no-build postgres minio compute-migrate api worker

            - name: Run backend smoke test
              run: bash scripts/e2e/backend_stack_smoke.sh

            - name: Capture compose diagnostics
              if: always()
              run: |
                  mkdir -p e2e-artifacts
                  docker compose ps -a > e2e-artifacts/compose-ps.txt || true
                  docker compose logs --no-color > e2e-artifacts/compose.log || true
                  cp -f ./*.json ./*.jsonl ./*.txt e2e-artifacts/ 2>/dev/null || true

            - name: Upload diagnostics
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: compose-smoke-diagnostics
                  path: e2e-artifacts
                  if-no-files-found: ignore

            - name: Stop stack
              if: always()
              run: docker compose down -v --remove-orphans

    promote-images:
        name: Promote Docker images
        needs: compose-smoke
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            id-token: write
        steps:
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Install cosign
              uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
              with:
                  cosign-release: "v2.4.3"

            - name: Promote tested candidates
              run: |
                  set -euo pipefail
                  short_sha="${GITHUB_SHA::7}"
                  images=(tsdhn-toolchain tsdhn-api tsdhn-web tsdhn-dev)

                  for image in "${images[@]}"; do
                      source_ref="${IMAGE_REGISTRY}/${image}:${CANDIDATE_TAG}"
                      release_ref="${IMAGE_REGISTRY}/${image}:${GITHUB_REF_NAME}"
                      branch_ref="${IMAGE_REGISTRY}/${image}:${RELEASE_BRANCH_TAG}"
                      sha_ref="${IMAGE_REGISTRY}/${image}:sha-${short_sha}"

                      docker buildx imagetools create \
                          -t "$release_ref" \
                          -t "$branch_ref" \
                          -t "$sha_ref" \
                          "$source_ref"

                      cosign sign --yes "$release_ref" "$branch_ref" "$sha_ref"
                  done

    publish-pypi:
        name: Publish to PyPI
        needs: [build-sdist-wheels, promote-images]

        # Only publish when PyPI trusted publishing is explicitly configured.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && vars.PUBLISH_PYPI == 'true'
        runs-on: ubuntu-latest

        permissions:
            id-token: write
            attestations: write

        environment: pypi

        steps:
            - name: Download dist artifacts
              uses: actions/download-artifact@v8
              with:
                  name: dist
                  path: dist

            - name: Attest PyPI artifacts (SLSA build provenance)
              uses: actions/attest@v4.1.1
              with:
                  subject-path: dist/**/*.tar.gz,dist/**/*.whl
                  show-summary: false

            - name: Publish tsdhn
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  packages-dir: dist/tsdhn

    release-notes:
        name: Generate release notes
        needs: [build-model-assets, promote-images]
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Download model assets
              uses: actions/download-artifact@v8
              with:
                  name: model-assets
                  path: dist/model

            - uses: softprops/action-gh-release@v3
              with:
                  generate_release_notes: true
                  files: dist/model/*
