name: Release

on:
    push:
        tags: ["v*.*.*"]
    workflow_dispatch:
        inputs:
            dry_run:
                description: "Dry run (build + test, no publish)"
                type: boolean
                default: false

# Default: no permissions.
# Each job opts into what it needs.
permissions: {}

concurrency:
    group: release-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

env:
    UV_VERSION: "0.11.27"
    PYTHON_VERSION: "3.14"

jobs:
    build-sdist-wheels:
        name: Build sdist + wheels
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - uses: astral-sh/setup-uv@v8.3.0
              with:
                  version: ${{ env.UV_VERSION }}
                  python-version: ${{ env.PYTHON_VERSION }}
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            - name: Sync with build group
              run: uv sync --all-packages --group dev --group build

            - name: Build tsdhn-api
              run: uv build --package tsdhn-api --out-dir dist/api

            - name: Build tsdhn-cli
              run: uv build --package tsdhn-cli --out-dir dist/cli

            - name: Upload dist artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: dist
                  path: |
                      dist/api/*
                      dist/cli/*

    publish-pypi:
        name: Publish to PyPI
        needs: build-sdist-wheels

        # Only publish on real tag pushes, not on workflow_dispatch dry-runs.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        runs-on: ubuntu-latest

        permissions:
            id-token: write
            attestations: write

        environment: pypi

        steps:
            - name: Download dist artifacts
              uses: actions/download-artifact@v8
              with:
                  name: dist
                  path: dist

            - name: Attest PyPI artifacts (SLSA build provenance)
              uses: actions/attest@v4.1.1
              with:
                  subject-path: dist/**/*.tar.gz,dist/**/*.whl
                  show-summary: false

            - name: Publish tsdhn-api
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  packages-dir: dist/api

            - name: Publish tsdhn-cli
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  packages-dir: dist/cli

    publish-toolchain-image:
        name: Build & push Docker (toolchain)
        needs: build-sdist-wheels
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            id-token: write
            attestations: write
            artifact-metadata: write
        steps:
            - uses: actions/checkout@v7

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
              with:
                  images: ghcr.io/${{ github.repository_owner }}/tsdhn-toolchain
                  tags: |
                      type=ref,event=tag
                      type=raw,value=main
                      type=sha,format=short

            - name: Build and push
              id: build
              uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
              with:
                  context: .
                  file: deploy/toolchain.Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha,scope=toolchain
                  cache-to: type=gha,mode=max,scope=toolchain
                  platforms: linux/amd64
                  provenance: true
                  sbom: true

            # Docs: https://github.com/actions/attest#container-image
            - name: Attest image (SLSA build provenance, pushed to registry)
              uses: actions/attest@v4.1.1
              with:
                  # subject-name must be the fully-qualified image name, no tag.
                  subject-name: ghcr.io/${{ github.repository_owner }}/tsdhn-toolchain
                  subject-digest: ${{ steps.build.outputs.digest }}
                  push-to-registry: true
                  show-summary: false

            - name: Install cosign
              uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
              with:
                  cosign-release: "v2.4.3"

            - name: Sign published image
              env:
                  TAGS: ${{ steps.meta.outputs.tags }}
                  DIGEST: ${{ steps.build.outputs.digest }}
              run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

    publish-app-images:
        name: Build & push Docker (${{ matrix.target }})
        needs: [build-sdist-wheels, publish-toolchain-image]
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            id-token: write
            attestations: write
            artifact-metadata: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: api
                      image: tsdhn-api
                      dockerfile: deploy/api.Dockerfile
                      cache_scope: api
                    - target: web
                      image: tsdhn-web
                      dockerfile: deploy/web.Dockerfile
                      cache_scope: web
                    - target: development
                      image: tsdhn-dev
                      dockerfile: .devcontainer/Dockerfile
                      cache_scope: dev
        steps:
            - uses: actions/checkout@v7

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
              with:
                  images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
                  tags: |
                      type=ref,event=tag
                      type=raw,value=main
                      type=sha,format=short

            - name: Build and push
              id: build
              uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
              with:
                  context: .
                  file: ${{ matrix.dockerfile }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      TOOLCHAIN_IMAGE=ghcr.io/${{ github.repository_owner }}/tsdhn-toolchain:${{ github.ref_name }}
                  cache-from: type=gha,scope=${{ matrix.cache_scope }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
                  platforms: linux/amd64
                  provenance: true
                  sbom: true

            # Docs: https://github.com/actions/attest#container-image
            - name: Attest image (SLSA build provenance, pushed to registry)
              uses: actions/attest@v4.1.1
              with:
                  # subject-name must be the fully-qualified image name, no tag.
                  subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
                  subject-digest: ${{ steps.build.outputs.digest }}
                  push-to-registry: true
                  show-summary: false

            - name: Install cosign
              uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
              with:
                  cosign-release: "v2.4.3"

            - name: Sign published image
              env:
                  TAGS: ${{ steps.meta.outputs.tags }}
                  DIGEST: ${{ steps.build.outputs.digest }}
              run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

    release-notes:
        name: Generate release notes
        needs: build-sdist-wheels
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - uses: softprops/action-gh-release@v3
              with:
                  generate_release_notes: true
