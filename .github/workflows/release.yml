name: Release

on:
    push:
        tags: ["v*.*.*"]
    workflow_dispatch:
        inputs:
            dry_run:
                description: "Dry run (build + test, no publish)"
                type: boolean
                default: false

# Default: no permissions. Each job opts into what it needs.
permissions: {}

concurrency:
    group: release-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

env:
    UV_VERSION: "0.11.25"
    PYTHON_VERSION: "3.14"

jobs:
    build-sdist-wheels:
        name: Build sdist + wheels
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - uses: astral-sh/setup-uv@v8
              with:
                  version: ${{ env.UV_VERSION }}
                  python-version: ${{ env.PYTHON_VERSION }}
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            - name: Sync with build group
              run: uv sync --all-packages --group dev --group build

            - name: Build orchestrator
              run: uv build --package orchestrator --out-dir dist/orchestrator

            - name: Build cli
              run: uv build --package cli --out-dir dist/cli

            - name: Upload dist artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: dist
                  path: |
                      dist/orchestrator/*
                      dist/cli/*

    publish-pypi:
        name: Publish to PyPI
        needs: build-sdist-wheels
        # Only publish on real tag pushes, not on workflow_dispatch dry-runs.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            attestations: write
        environment: pypi
        steps:
            - name: Download dist artifacts
              uses: actions/download-artifact@v8
              with:
                  name: dist
                  path: dist

            - name: Attest PyPI artifacts (SLSA build provenance)
              uses: actions/attest@v4.1.1
              with:
                  subject-path: dist/**/*.tar.gz,dist/**/*.whl
                  show-summary: false

            - name: Publish orchestrator
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  packages-dir: dist/orchestrator

            - name: Publish cli
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  packages-dir: dist/cli

    publish-images:
        name: Build & push Docker (${{ matrix.target }})
        needs: build-sdist-wheels
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            id-token: write
            attestations: write
            artifact-metadata: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: production
                      image: seismic-toolkit
                      dockerfile: .devcontainer/prod/Dockerfile
                      cache_scope: prod
                    - target: development
                      image: seismic-toolkit-dev
                      dockerfile: .devcontainer/dev/Dockerfile
                      cache_scope: dev
        steps:
            - uses: actions/checkout@v7

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@c887d9748da14dcb42b11cf8bcc773b301ea55b5 # v4.1.0

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@3864d6aed8ff134b2ed894ce00c87695c709c870 # v4.2.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@020b7354dd55a28effcab0f3b19639fe24d3f58b # v6.1.0
              with:
                  images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
                  tags: |
                      type=ref,event=tag
                      type=sha,format=short

            - name: Build and push
              id: build
              uses: docker/build-push-action@ff26911fd365b0233252dfbd8eede1c0e9ef9a51 # v7.2.0
              with:
                  context: .
                  file: ${{ matrix.dockerfile }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha,scope=${{ matrix.cache_scope }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
                  platforms: linux/amd64
                  provenance: true
                  sbom: true

            # Docs: https://github.com/actions/attest#container-image
            - name: Attest image (SLSA build provenance, pushed to registry)
              uses: actions/attest@v4.1.1
              with:
                  # subject-name must be the fully-qualified image name, no tag.
                  subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
                  subject-digest: ${{ steps.build.outputs.digest }}
                  push-to-registry: true
                  show-summary: false

            - name: Install cosign
              uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
              with:
                  cosign-release: "v2.4.3"

            - name: Sign published image
              env:
                  TAGS: ${{ steps.meta.outputs.tags }}
                  DIGEST: ${{ steps.build.outputs.digest }}
              run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

    release-notes:
        name: Generate release notes
        needs: build-sdist-wheels
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - uses: softprops/action-gh-release@v3
              with:
                  generate_release_notes: true
