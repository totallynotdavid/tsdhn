[tools]
python = "3.14.6"
uv = "0.11.29"
bun = "1.3.14"
gitleaks = "8.30.1"
"libsql-server" = { version = "0.24.32", version_prefix = "libsql-server-v" }

[tasks]
install = "uv sync --all-packages --group dev --group build"

lint = [
    "uv run ruff check --select E,F,W,I,B,UP,S,SIM,RUF .",
    "uv run ruff format --check .",
    "uv run mypy --strict packages",
]

fix = [
    "uv run ruff check --fix --unsafe-fixes .",
    "uv run ruff format .",
]

test = "uv run pytest -n auto"

coverage = [
    "uv run coverage run -m pytest",
    "uv run coverage report --fail-under=70",
    "uv run coverage json",
]

security = [
    "uv run bandit -r packages -lll --skip B101",
    "uv run pip-audit --strict --skip-editable",
    "gitleaks detect --source . --no-banner",
]

build = [
    "uv build --package tsdhn --out-dir dist/tsdhn",
    "uv build --package tsdhn-api --out-dir dist/api",
]

api = "uv run tsdhn-api"
worker = "uv run tsdhn-worker"

web-install = "bun install"
web-dev = "bun --filter web dev"
web-build = "bun --filter web build"
web-check = "bun --filter web check"
lint-js = "bun run lint"
fmt-js = "bun run fmt"
fmt-check-js = "bun run fmt:check"
gen-client = "bun run gen:client"

# Self-hosted libSQL database (sqld). Data persists under ./data/libsql.
db = "sqld --http-listen-addr 127.0.0.1:8080 --db-path ./data/libsql"

dev-up = "podman compose up -d"
dev-web = "podman compose --profile web up"
dev-down = "podman compose down"
dev-logs = "podman compose logs -f"

lint-all = ["mise run lint", "mise run lint-js", "mise run fmt-check-js"]
fix-all = ["mise run fix", "mise run fmt-js"]

doctor = [
    "uv run python --version",
    "uv --version",
    "uv run ruff --version",
    "uv run mypy --version",
    "gitleaks version",
]

# mise silently skips `_.file` when the file is absent, so this works before
# setup.sh has been run; `mise run api` will then fail at startup with the
# usual "TSDHN model assets are not installed" error until the env file exists.
[env]
_.file = ".tsdhn/env"
