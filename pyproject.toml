[project]
name = "picv-2025"
version = "0.1.0"
description = "Tsunami simulation orchestrator workspace"
requires-python = ">=3.14"
readme = "readme.md"
license = { text = "MIT" }
authors = [
    { name = "David Duran", email = "dadch1404@gmail.com" },
]

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
orchestrator = { workspace = true }
cli = { workspace = true }

[dependency-groups]
dev = [
    "ruff>=0.9.6",
    "mypy>=1.15",
    "types-PyYAML",
    "pytest>=7.4",
    "pytest-asyncio>=0.21",
    "pytest-cov>=4.1",
    "httpx>=0.25",
]

[tool.ruff]
target-version = "py314"
line-length = 88
indent-width = 4
extend-exclude = ["__pycache__", "dist", "build"]

[tool.ruff.lint]
select = ["E", "F", "B", "I"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.mypy]
python_version = "3.14"
ignore_missing_imports = true
warn_unused_ignores = true

[tool.pytest.ini_options]
testpaths = ["packages/orchestrator/tests"]
addopts = "-ra"
